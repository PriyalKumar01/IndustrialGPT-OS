version: '3.8'

services:
  # Relational Database (Relational metadata, audit trail, user credentials)
  postgres:
    image: postgres:15-alpine
    container_name: industrial_postgres
    environment:
      POSTGRES_DB: industrial_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: SecretPassword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d industrial_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Graph Database (Equipment structure, permits, incidents connections)
  neo4j:
    image: neo4j:5.16-community
    container_name: industrial_neo4j
    environment:
      NEO4J_AUTH: neo4j/SecretPassword123
    ports:
      - "7474:7474" # HTTP Browser
      - "7687:7687" # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "SecretPassword123", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Event broker (Redis for caching, API rate-limiting, and Celery task broker)
  redis:
    image: redis:7-alpine
    container_name: industrial_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # FastAPI API Gateway Server
  api:
    build: .
    container_name: industrial_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:SecretPassword123@postgres:5432/industrial_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SecretPassword123
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=mock-key
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Celery Worker (Asynchronous OCR & Vector Ingestion pipeline)
  worker:
    build: .
    container_name: industrial_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    volumes:
      - .:/code
    environment:
      - DATABASE_URL=postgresql://admin:SecretPassword123@postgres:5432/industrial_db
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=SecretPassword123
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - postgres

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
